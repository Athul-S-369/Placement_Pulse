name: Daily Opportunity Update

on:
  schedule:
    # 05:30 UTC = 11:00 AM IST  |  13:30 UTC = 7:00 PM IST
    - cron: "30 5 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — scrape but skip commit"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      generate_only:
        description: "Only regenerate content, skip scraping"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: placementpulse-update
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  update:
    name: Scrape & Generate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history so push never conflicts
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Decide run mode ──────────────────────────────────────────────────────
      # Scheduled runs → full pipeline (scrape + generate, no dry-run)
      # Manual with generate_only=true → skip scraping
      # Manual with dry_run=true → run everything but don't commit
      - name: Run pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          GENERATE_ONLY="${{ inputs.generate_only }}"
          DRY_RUN="${{ inputs.dry_run }}"

          if [ "$GENERATE_ONLY" = "true" ]; then
            echo "Mode: generate-only"
            python scripts/main.py --generate-only --dry-run
          elif [ "$DRY_RUN" = "true" ]; then
            echo "Mode: dry-run"
            python scripts/main.py --dry-run
          else
            echo "Mode: full pipeline"
            python scripts/main.py --dry-run
          fi

      # ── Commit only when real changes exist ──────────────────────────────────
      - name: Commit and push if changed
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "PlacementPulse Bot"
          git config user.email "bot@placementpulse.dev"
          git add -A

          if git diff --cached --quiet; then
            echo "✓ No changes — skipping commit."
          else
            TODAY=$(date -u +%Y-%m-%d)
            COUNT=$(python -c "import json; print(len(json.load(open('data/processed/opportunities.json'))))" 2>/dev/null || echo "?")
            git commit -m "feat(data): update opportunities for $TODAY ($COUNT total)"

            # Pull any remote changes (e.g. from a concurrent run) then push
            git pull --rebase origin main || true
            git push origin main
            echo "✓ Pushed: feat(data): update opportunities for $TODAY ($COUNT total)"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    needs: update
    # Run on schedule always; on manual only when dry_run is false
    if: ${{ github.event_name == 'schedule' || inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
